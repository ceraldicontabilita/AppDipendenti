services:
  - type: web
    name: AppDipendenti
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL          # stringa MongoDB Atlas (stesso cluster Gestionale)
        sync: false
      - key: DB_NAME
        value: Gestionale
      - key: JWT_SECRET         # segreto firma token (nuovo, non riusare il vecchio)
        sync: false
      - key: PIN_CODE           # PIN admin (mobile) — valore SOLO qui, non nel codice
        sync: false
      - key: PIN_ADMIN_USERNAME
        value: ceraldi
      - key: ANTHROPIC_API_KEY  # opzionale (estrazione AI documenti)
        sync: false
      - key: IMAP_USER          # opzionale (import buste da Gmail)
        sync: false
      - key: IMAP_PASSWORD      # opzionale (App Password Gmail)
        sync: false
      - key: OPENAPI_CLIENT_ID      # OpenAPI.com eSignature/PEC/Marche Temporali (OAuth V2)
        sync: false
      - key: OPENAPI_CLIENT_SECRET  # segreto OAuth — SOLO qui, mai nel codice (rigenerare il token esposto)
        sync: false
      - key: OPENAPI_ENV            # "sandbox" (test) | "production"
        value: sandbox
